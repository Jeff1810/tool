name: IP-Pure
description: ip纯净度检测（IPPure）
compat_arguments:
  Proxy: Global
  MarkIP: 'false'
compat_arguments_desc: 'Proxy: 选择策略组,默认DIRECT. @from wish | MarkIP: IP 打码(true/false),默认 false'
dns: {}
rules:
- domain_suffix:
    match: ippure.com
    policy: Global
scriptings:
- generic:
    name: IP-Pure
    script_url: https://raw.githubusercontent.com/Jeff1810/tool/refs/heads/master/IPPure2.js
    arguments:
      _compat.$argument: title=IPPure&colorlow=leaf.fill&iconmid=leaf.fill&colorhigh=leaf.fill&colorextreme=leaf.fill&colorlow=#00D42E&colormid=#93DE09&colorhigh=#FF9500&colorextreme=#FF3B30
    timeout: 10
panels:
- name: IP-Pure
  title: IPPure
  content: 刷新中…
  style: info
  script_name: IP-Pure
  update_interval: -1

