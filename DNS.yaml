dns:
  # Forward (转发规则)
  forward:
    # --- BiliBili 视频服务器加速 ---
    - domain_wildcard:
        match: 'upos-sz-mirrorali.bilivideo.com'   
# BiliBili upos视频服务器（阿里云）
        value: quic://dns.alidns.com
    - domain_wildcard:
        match: 'upos-sz-mirrorali?.bilivideo.com'  
# BiliBili upos视频服务器（阿里云）
        value: quic://dns.alidns.com
    - domain_wildcard:
        match: 'upos-sz-mirrorali??.bilivideo.com' 
# BiliBili upos视频服务器（阿里云）
        value: quic://dns.alidns.com
    - domain_wildcard:
        match: 'upos-sz-mirrorbos.bilivideo.com'   
# BiliBili upos视频服务器（百度云）
        value: 180.76.76.76
    - domain_wildcard:
        match: 'upos-sz-mirrorcos.bilivideo.com'   
# BiliBili upos视频服务器（腾讯云）
        value: https://doh.pub/dns-query
    - domain_wildcard:
        match: 'upos-sz-mirrorcos?.bilivideo.com'  
# BiliBili upos视频服务器（腾讯云）
        value: https://doh.pub/dns-query
    - domain_wildcard:
        match: 'upos-sz-mirrorcos??.bilivideo.com' 
# BiliBili upos视频服务器（腾讯云）
        value: https://doh.pub/dns-query
    - domain_wildcard:
        match: 'upos-sz-upcdnbd??.bilivideo.com'  
 # BiliBili upos视频服务器（百度云）
        value: 180.76.76.76
    - domain_wildcard:
        match: 'upos-sz-upcdntx.bilivideo.com'     # BiliBili upos视频服务器（腾讯云）
        value: https://doh.pub/dns-query

    # --- Modify Contents  ---
    - domain:
        match: blog.google                         # Google Blog
        value: 119.29.29.29
    - domain:
        match: googletraveladservices.com          # Google Flights
        value: 119.29.29.29
    - domain:
        match: dl.google.com                       # Google Download
        value: 119.29.29.29
    - domain:
        match: dl.l.google.com                     # Google Download
        value: 119.29.29.29
    - domain:
        match: clientservices.googleapis.com       # Google Chrome
        value: 119.29.29.29
    - domain:
        match: update.googleapis.com               # Google Update
        value: 119.29.29.29
    - domain:
        match: translate.googleapis.com            # Google Translate
        value: 119.29.29.29
    - domain:
        match: fonts.googleapis.com                # Google Fonts
        value: 119.29.29.29
    - domain:
        match: fonts.gstatic.com                   # Google Fonts
        value: 119.29.29.29
    - domain:
        match: stun.l.google.com                   # Google STUN
        value: system
    - domain_wildcard:
        match: 'stun?.l.google.com'                # Google STUN
        value: system

    # --- Router Admin Panel (路由器管理面板直连) ---
    - domain_wildcard:
        match: '*.id.ui.direct'                    # Ubiquiti Unifi Network App
        value: system
    - domain:
        match: unifi.local                         # Ubiquiti Unifi OS
        value: system
    - domain:
        match: amplifi.lan                         # Ubiquiti Amplifi Router
        value: system
    - domain:
