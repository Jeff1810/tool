name: YouTube DualSubs
description: YouTube 增强及双语字幕(歌词)
compat_arguments:
  Type: Translate
  Types: Translate
  AutoCC: 'true'
  Position: Forward
  Vendor: Google
  ShowOnly: 'false'
  LogLevel: WARN
compat_arguments_desc: |
  Type: [字幕] 启用类型
      ├ Official: 官方字幕（合成器）
      └ Translate: 翻译字幕（翻译器）
  请选择要使用的字幕，双语字幕将使用您选择类型呈现。

  Types: [歌词] 启用类型
      └ Translate: 翻译歌词（翻译器）
  请选择要添加的歌词选项，如果为多选，则会自动决定提供的歌词类型。

  AutoCC: [字幕] 自动显示
  是否总是自动开启字幕显示。

  Position: [字幕] 主语言（源语言）字幕位置
      ├ Forward: 上面（第一行）
      └ Reverse: 下面（第二行）
  主语言（源语言）字幕的显示位置。

  Vendor: [翻译器] 服务商API
      ├ Google: Google Translate
      └ Microsoft: Microsoft Translator（需填写API）
  请选择翻译器所使用的服务商API，更多翻译选项请使用BoxJs。

  ShowOnly: [翻译器] 只显示“自动翻译”字幕
  是否仅显示“自动翻译”字幕，不显示源语言字幕。

  LogLevel: [调试] 日志等级
      ├ OFF: 关闭
      ├ ERROR: ❌ 错误
      ├ WARN: ⚠️ 警告
      ├ INFO: ℹ️ 信息
      ├ DEBUG: 🅱️ 调试
      └ ALL: 全部
  选择脚本日志的输出等级，低于所选等级的日志将全部输出。
open_url: http://boxjs.com/#/app/DualSubs.YouTube
author: VirgilClyne[https://github.com/VirgilClyne]
homepage: https://DualSubs.github.io/guide/youtube
icon: https://github.com/DualSubs/YouTube/raw/main/src/assets/icon_rounded.png
dns: {}
rules:
- url_regex:
    match: ^https?:\/\/([\w-]+)\.googlevideo\.com\/initplayback(\?.*oad=.+)$
    policy: REJECT
scriptings:
- http_request:
    name: 🍿️ DualSubs.YouTube.Player.request.json
    match: ^https?:\/\/(www|m|tv)\.youtube\.com\/youtubei\/v1\/player(\?.+)?$
    script_url: https://github.com/DualSubs/YouTube/releases/download/v1.5.11/request.bundle.js
    arguments:
      _compat.$argument: Type="Translate"&Types="Translate"&AutoCC="true"&Position="Forward"&Vendor="Google"&ShowOnly="false"&LogLevel="WARN"
    body_required: true
- http_response:
    name: 🍿️ DualSubs.YouTube.Player.response.json
    match: ^https?:\/\/(www|m|tv)\.youtube\.com\/youtubei\/v1\/player(\?.+)?$
    script_url: https://github.com/DualSubs/YouTube/releases/download/v1.5.11/response.bundle.js
    arguments:
      _compat.$argument: Type="Translate"&Types="Translate"&AutoCC="true"&Position="Forward"&Vendor="Google"&ShowOnly="false"&LogLevel="WARN"
    body_required: true
- http_request:
    name: 🍿️ DualSubs.YouTube.Player.request.proto
    match: ^https?:\/\/youtubei\.googleapis\.com\/youtubei\/v1\/player(\?.+)?$
    script_url: https://github.com/DualSubs/YouTube/releases/download/v1.5.11/request.bundle.js
    arguments:
      _compat.$argument: Type="Translate"&Types="Translate"&AutoCC="true"&Position="Forward"&Vendor="Google"&ShowOnly="false"&LogLevel="WARN"
    body_required: true
    binary_body: true
- http_response:
    name: 🍿️ DualSubs.YouTube.Player.response.proto
    match: ^https?:\/\/youtubei\.googleapis\.com\/youtubei\/v1\/player(\?.+)?$
    script_url: https://github.com/DualSubs/YouTube/releases/download/v1.5.11/response.bundle.js
    arguments:
      _compat.$argument: Type="Translate"&Types="Translate"&AutoCC="true"&Position="Forward"&Vendor="Google"&ShowOnly="false"&LogLevel="WARN"
    body_required: true
    binary_body: true
- http_response:
    name: 🍿️ DualSubs.YouTube.GetWatch.response.proto
    match: ^https?:\/\/youtubei\.googleapis\.com\/youtubei\/v1\/get_watch(\?.+)?$
    script_url: https://github.com/DualSubs/YouTube/releases/download/v1.5.11/response.bundle.js
    arguments:
      _compat.$argument: Type="Translate"&Types="Translate"&AutoCC="true"&Position="Forward"&Vendor="Google"&ShowOnly="false"&LogLevel="WARN"
    body_required: true
    binary_body: true
- http_request:
    name: 🍿️ DualSubs.YouTube.TimedText.request
    match: ^https?:\/\/(www|m)\.youtube\.com\/api\/timedtext(\?.+)?$
    script_url: https://github.com/DualSubs/YouTube/releases/download/v1.5.11/request.bundle.js
    arguments:
      _compat.$argument: Type="Translate"&Types="Translate"&AutoCC="true"&Position="Forward"&Vendor="Google"&ShowOnly="false"&LogLevel="WARN"
- http_response:
    name: 🍿️ DualSubs.YouTube.Composite.TimedText.response
    match: ^https?:\/\/(www|m)\.youtube\.com\/api\/timedtext\?(.*)subtype=(Official|External)
    script_url: https://github.com/DualSubs/Universal/releases/latest/download/Composite.Subtitles.response.bundle.js
    arguments:
      _compat.$argument: Type="Translate"&Types="Translate"&AutoCC="true"&Position="Forward"&Vendor="Google"&ShowOnly="false"&LogLevel="WARN"
    body_required: true
- http_response:
    name: 🍿️ DualSubs.YouTube.Translate.TimedText.response
    match: ^https?:\/\/(www|m)\.youtube\.com\/api\/timedtext\?(.*)subtype=Translate
    script_url: https://github.com/DualSubs/Universal/releases/latest/download/Translate.response.bundle.js
    arguments:
      _compat.$argument: Type="Translate"&Types="Translate"&AutoCC="true"&Position="Forward"&Vendor="Google"&ShowOnly="false"&LogLevel="WARN"
    body_required: true
- http_request:
    name: 🍿️ DualSubs.YouTubeMusic.Browse.request.json
    match: ^https?:\/\/music\.youtube\.com\/youtubei\/v1\/browse(\?.+)?$
    script_url: https://github.com/DualSubs/YouTube/releases/download/v1.5.11/request.bundle.js
    arguments:
      _compat.$argument: Type="Translate"&Types="Translate"&AutoCC="true"&Position="Forward"&Vendor="Google"&ShowOnly="false"&LogLevel="WARN"
    body_required: true
- http_request:
    name: 🍿️ DualSubs.YouTube.Browse.request.proto
    match: ^https?:\/\/youtubei\.googleapis\.com\/youtubei\/v1\/browse(\?.+)?$
    script_url: https://github.com/DualSubs/YouTube/releases/download/v1.5.11/request.bundle.js
    arguments:
      _compat.$argument: Type="Translate"&Types="Translate"&AutoCC="true"&Position="Forward"&Vendor="Google"&ShowOnly="false"&LogLevel="WARN"
    body_required: true
    binary_body: true
- http_response:
    name: 🍿️ DualSubs.YouTubeMusic.Translate.Lyrics.response.json
    match: ^https?:\/\/music\.youtube\.com\/youtubei\/v1\/browse\?(.*)subtype=Translate
    script_url: https://github.com/DualSubs/Universal/releases/latest/download/Translate.response.bundle.js
    arguments:
      _compat.$argument: Type="Translate"&Types="Translate"&AutoCC="true"&Position="Forward"&Vendor="Google"&ShowOnly="false"&LogLevel="WARN"
    body_required: true
- http_response:
    name: 🍿️ DualSubs.YouTubeMusic.Translate.Lyrics.response.proto
    match: ^https?:\/\/youtubei\.googleapis\.com\/youtubei\/v1\/browse\?(.*)subtype=Translate
    script_url: https://github.com/DualSubs/Universal/releases/latest/download/Translate.response.bundle.js
    arguments:
      _compat.$argument: Type="Translate"&Types="Translate"&AutoCC="true"&Position="Forward"&Vendor="Google"&ShowOnly="false"&LogLevel="WARN"
    body_required: true
    binary_body: true
mitm:
  hostnames:
    includes:
    - www.youtube.com
    - m.youtube.com
    - tv.youtube.com
    - music.youtube.com
    - youtubei.googleapis.com
    - '*.googlevideo.com'
    excludes:
    - redirector*.googlevideo.com
